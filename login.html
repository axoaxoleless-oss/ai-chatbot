<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axon — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <main class="login-wrap">
    <div class="login-card" id="card">
      <!-- Logo -->
      <div class="logo-wrap">
        <div class="logo-hex">
          <svg viewBox="0 0 48 48" fill="none">
            <polygon points="24,4 44,15 44,33 24,44 4,33 4,15"
              stroke="currentColor" stroke-width="1.5" fill="none"/>
            <polygon points="24,10 38,18 38,30 24,38 10,30 10,18"
              fill="currentColor" opacity=".15"/>
            <circle cx="24" cy="24" r="5" fill="currentColor"/>
            <line x1="24" y1="10" x2="24" y2="19" stroke="currentColor" stroke-width="1.2" opacity=".5"/>
            <line x1="24" y1="29" x2="24" y2="38" stroke="currentColor" stroke-width="1.2" opacity=".5"/>
            <line x1="10" y1="18" x2="18.5" y2="23" stroke="currentColor" stroke-width="1.2" opacity=".5"/>
            <line x1="29.5" y1="25" x2="38" y2="30" stroke="currentColor" stroke-width="1.2" opacity=".5"/>
            <line x1="38" y1="18" x2="29.5" y2="23" stroke="currentColor" stroke-width="1.2" opacity=".5"/>
            <line x1="18.5" y1="25" x2="10" y2="30" stroke="currentColor" stroke-width="1.2" opacity=".5"/>
          </svg>
        </div>
        <div class="logo-name">Axon</div>
        <div class="logo-tag">AI</div>
      </div>

      <h1 class="card-title">Welcome back</h1>
      <p class="card-sub">Sign in with Gmail to access your conversations, memories, and settings.</p>

      <!-- Error -->
      <div class="login-error" id="login-error" style="display:none">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.2"/><path d="M8 5v3M8 10.5v.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <span id="error-text">An error occurred</span>
      </div>

      <!-- Google button -->
      <button class="google-btn" id="google-btn">
        <svg class="google-icon" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Continue with Google
      </button>

      <p class="login-note">Only Gmail accounts are supported. Your data is private and tied to your account.</p>

      <div class="login-loader" id="login-loader" style="display:none">
        <div class="loader-dots"><span></span><span></span><span></span></div>
        <span>Signing in…</span>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp }                       from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider,
             signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { firebaseConfig }                      from './config.js';

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();
    provider.addScope('email');
    provider.setCustomParameters({ hd: '' }); // allow all Google accounts

    // If already logged in → go straight to app
    onAuthStateChanged(auth, user => {
      if (user) window.location.replace('index.html');
    });

    const btn       = document.getElementById('google-btn');
    const errorBox  = document.getElementById('login-error');
    const errorText = document.getElementById('error-text');
    const loader    = document.getElementById('login-loader');

    function showError(msg) {
      errorText.textContent = msg;
      errorBox.style.display = 'flex';
      loader.style.display   = 'none';
      btn.style.display      = 'flex';
    }

    btn.addEventListener('click', async () => {
      errorBox.style.display = 'none';
      btn.style.display      = 'none';
      loader.style.display   = 'flex';
      try {
        const result = await signInWithPopup(auth, provider);
        const email  = result.user.email || '';
        // Restrict to @gmail.com
        if (!email.endsWith('@gmail.com')) {
          await auth.signOut();
          showError('Only @gmail.com accounts are allowed. Please try a different account.');
          return;
        }
        window.location.replace('index.html');
      } catch (err) {
        if (err.code === 'auth/popup-closed-by-user') {
          showError('Sign-in cancelled.');
        } else {
          showError(err.message || 'Sign-in failed. Please try again.');
        }
      }
    });
  </script>
</body>
</html>
